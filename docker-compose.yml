
services:
  postgres:
    image: postgres:17
    container_name: cloudforge-postgres
    restart: unless-stopped
    enivornment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cloudforge

    ports:
     - "5432:5432" 

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
